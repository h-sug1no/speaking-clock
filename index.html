<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Clock - Minimal Voice Announcer</title>
    <style>
        /* モダンなグラスモーフィズム・デザイン */
        :root {
            --bg-color: #0f0f0f;
            --accent-color: #007aff;
            --text-color: #e0e0e0;
            --border-color: #333;
            --card-bg: rgba(30, 30, 30, 0.85);
            --grad-start: #1a1a2e;
            --grad-end: #0f0f0f;
            --clock-color: #ffffff;
            --input-bg: #2a2a2a;
            --input-text: #ffffff;
        }

        /* サイバーマトリックス・テーマ */
        .theme-cyberpunk {
            --bg-color: #020617;
            --accent-color: #22c55e;
            --text-color: #f0fdf4;
            --card-bg: rgba(15, 23, 42, 0.9);
            --grad-start: #064e3b;
            --grad-end: #020617;
            --clock-color: #22c55e;
            --border-color: #065f46;
            --input-bg: #0f172a;
            --input-text: #22c55e;
        }

        /* ピュアホワイト・テーマ */
        .theme-soft {
            --bg-color: #f8fafc;
            --accent-color: #f43f5e;
            --text-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.9);
            --grad-start: #ffe4e6;
            --grad-end: #f8fafc;
            --clock-color: #0f172a;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --input-text: #0f172a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        #startupOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #startupButton {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #startupButton:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 122, 255, 0.5);
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at 50% 50%, var(--grad-start) 0%, var(--grad-end) 100%);
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.5s ease;
            position: relative;
        }

        .timer-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 30px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.12);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 1;
            cursor: default;
            overflow: hidden;
        }

        .timer-card:has(#settingsBody.collapsed) {
            max-width: 620px;
            padding: 60px 40px;
        }

        .timer-card.is-speaking {
            transform: scale(1.03);
            box-shadow: 0 40px 80px rgba(0, 122, 255, 0.3);
            border-color: var(--accent-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .status-badge {
            padding: 6px 12px;
            background: rgba(0, 122, 255, 0.1);
            color: var(--accent-color);
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 122, 255, 0.1);
        }

        .status-badge.speaking {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .settings-toggle {
            background: rgba(128, 128, 128, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-color);
            padding: 10px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 13px;
            font-weight: bold;
        }

        .date-display {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-color);
            opacity: 0.8;
            letter-spacing: 0.05em;
            margin-bottom: 0px;
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .timer-card:has(#settingsBody.collapsed) .date-display {
            font-size: 44px;
            margin-bottom: 12px;
            opacity: 1;
        }

        .clock-display {
            font-size: 88px;
            font-weight: 500;
            text-align: center;
            margin: 0px 0 30px;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            color: var(--clock-color);
            text-shadow: 0 0 15px rgba(0,0,0,0.1);
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .timer-card:has(#settingsBody.collapsed) .clock-display {
            font-size: 140px;
            margin: 15px 0 15px;
            font-weight: 400;
            letter-spacing: -4px;
        }

        #settingsBody {
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 2000px;
            opacity: 1;
            position: relative;
            z-index: 10;
        }

        #settingsBody.collapsed {
            max-height: 0 !important;
            opacity: 0 !important;
            pointer-events: none;
        }

        .control-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            margin-top: 10px;
        }

        .settings-panel {
            background: rgba(0,0,0,0.1);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 10px;
        }

        label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-color);
            opacity: 0.6;
            margin-bottom: 6px;
            display: block;
        }

        select, textarea, input {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--input-text);
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-size: 13px;
            outline: none;
            transition: all 0.2s ease;
        }

        .dual-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        #ambientTestTrigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 0;
            outline: none;
        }

        .ripple {
            position: absolute;
            background: var(--accent-color);
            opacity: 0.4;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes ripple-effect {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body id="rootBody">

    <div id="startupOverlay">
        <button id="startupButton">Start Clock</button>
    </div>

    <div class="app-container" id="mainBg">
        <div class="timer-card" id="timerCard">
            <button id="ambientTestTrigger" title="Click to test playback"></button>
            <div class="card-header">
                <div class="status-badge" id="statusBadge">Active</div>
                <button class="settings-toggle" id="toggleSettings">
                    <span id="toggleText">Show Settings</span> ⚙️
                </button>
            </div>
            <div class="date-display" id="dateDisplay">----.--.-- (---)</div>
            <div class="clock-display" id="clock">00:00:00</div>
            <div id="settingsBody">
                <div class="control-section">
                    <div class="dual-grid">
                        <div class="control-group">
                            <label>Theme</label>
                            <select id="themeSelect">
                                <option value="default">Midnight</option>
                                <option value="theme-cyberpunk">Cyber Matrix</option>
                                <option value="theme-soft">Pure White</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>Master Volume: <span id="volValue">80%</span></label>
                            <input type="range" id="volInput" min="0" max="2" step="0.05" value="0.8">
                        </div>
                    </div>
                    <div class="settings-panel">
                        <label style="color: var(--accent-color);">English Voice</label>
                        <div class="dual-grid">
                            <select id="voiceSelectEn"></select>
                            <input type="number" id="rateInputEn" min="0.5" max="2.0" step="0.1" value="1.0">
                        </div>
                        <div class="control-group" style="margin-top:8px">
                            <label>Volume: <span id="volValueEn">100%</span></label>
                            <input type="range" id="volInputEn" min="0" max="1.5" step="0.05" value="1.0">
                        </div>
                        <textarea id="templateEn" style="margin-top:8px">It's {h} {m} and {s} seconds.</textarea>
                    </div>
                    <div class="settings-panel">
                        <label style="color: var(--accent-color);">Japanese Voice</label>
                        <div class="dual-grid">
                            <select id="voiceSelectJa"></select>
                            <input type="number" id="rateInputJa" min="0.5" max="2.0" step="0.1" value="1.0">
                        </div>
                        <div class="control-group" style="margin-top:8px">
                            <label>Volume: <span id="volValueJa">100%</span></label>
                            <input type="range" id="volInputJa" min="0" max="1.5" step="0.05" value="1.0">
                        </div>
                        <textarea id="templateJa" style="margin-top:8px">{h}時{m}分{s}秒です</textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DOM Elements ---
        const startupOverlay = document.getElementById('startupOverlay');
        const startupButton = document.getElementById('startupButton');
        const rootBody = document.getElementById('rootBody');
        const timerCard = document.getElementById('timerCard');
        const statusBadge = document.getElementById('statusBadge');
        const toggleSettingsBtn = document.getElementById('toggleSettings');
        const toggleText = document.getElementById('toggleText');
        const dateDisplay = document.getElementById('dateDisplay');
        const clockDisplay = document.getElementById('clock');
        const settingsBody = document.getElementById('settingsBody');
        const themeSelect = document.getElementById('themeSelect');
        const volInput = document.getElementById('volInput');
        const volValue = document.getElementById('volValue');
        const volInputEn = document.getElementById('volInputEn');
        const volValueEn = document.getElementById('volValueEn');
        const volInputJa = document.getElementById('volInputJa');
        const volValueJa = document.getElementById('volValueJa');
        const voiceSelectEn = document.getElementById('voiceSelectEn');
        const rateInputEn = document.getElementById('rateInputEn');
        const templateEn = document.getElementById('templateEn');
        const voiceSelectJa = document.getElementById('voiceSelectJa');
        const rateInputJa = document.getElementById('rateInputJa');
        const templateJa = document.getElementById('templateJa');
        const ambientTestTrigger = document.getElementById('ambientTestTrigger');

        // --- Settings & State ---
        const targetMinutes = [0, 7, 15, 22, 30, 37, 45, 52];
        const targetSeconds = [0, 30];
        const synth = window.speechSynthesis;
        let allVoices = [];
        const STORAGE_KEY = 'speaking_clock_v1_final';
        let lastAnnouncedTime = "";
        const weekdays = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];

        // --- Functions ---
        function applyTheme(themeName) {
            rootBody.className = (themeName === 'default') ? '' : themeName;
        }

        function saveSettings() {
            const isCollapsed = settingsBody.classList.contains('collapsed');
            const data = {
                theme: themeSelect.value,
                vol: volInput.value,
                volEn: volInputEn.value,
                volJa: volInputJa.value,
                vEn: voiceSelectEn.value,
                vJa: voiceSelectJa.value,
                tEn: templateEn.value,
                tJa: templateJa.value,
                rEn: rateInputEn.value,
                rJa: rateInputJa.value,
                isCollapsed: isCollapsed
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadSettings() {
            const raw = localStorage.getItem(STORAGE_KEY);
            const defaults = {
                theme: 'default', vol: 0.8, volEn: 1.0, volJa: 1.0,
                tEn: "It's {h} {m} and {s} seconds.",
                tJa: "{h}時{m}分{s}秒です",
                rEn: 1.0, rJa: 1.0, isCollapsed: true
            };
            const loaded = raw ? JSON.parse(raw) : {};
            const s = { ...defaults, ...loaded };
            
            themeSelect.value = s.theme;
            volInput.value = s.vol;
            volInputEn.value = s.volEn;
            volInputJa.value = s.volJa;
            templateEn.value = s.tEn;
            templateJa.value = s.tJa;
            rateInputEn.value = s.rEn;
            rateInputJa.value = s.rJa;
            
            applyTheme(s.theme);
            volValue.textContent = `${Math.round(s.vol * 100)}%`;
            volValueEn.textContent = `${Math.round(s.volEn * 100)}%`;
            volValueJa.textContent = `${Math.round(s.volJa * 100)}%`;

            if (s.isCollapsed) {
                settingsBody.classList.add('collapsed');
                toggleText.textContent = "Show Settings";
            } else {
                settingsBody.classList.remove('collapsed');
                toggleText.textContent = "Hide Settings";
            }

            window._tmpVEn = s.vEn;
            window._tmpVJa = s.vJa;
        }

        function setupVoices() {
            allVoices = synth.getVoices();
            if (allVoices.length === 0) return;

            const fEn = allVoices.map((v, i) => ({v, i})).filter(x => x.v.lang.includes('en-'));
            const fJa = allVoices.map((v, i) => ({v, i})).filter(x => x.v.lang.includes('ja-'));
            
            voiceSelectEn.innerHTML = fEn.map(x => `<option value="${x.i}">${x.v.name}</option>`).join('');
            voiceSelectJa.innerHTML = fJa.map(x => `<option value="${x.i}">${x.v.name}</option>`).join('');
            
            if (window._tmpVEn !== undefined) voiceSelectEn.value = window._tmpVEn;
            if (window._tmpVJa !== undefined) voiceSelectJa.value = window._tmpVJa;
        }

        function createRipple(e) {
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            const rect = timerCard.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = `${size}px`;
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            timerCard.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function announce(h, m, s, isManual = false) {
            const currentTimeKey = `${h}:${m}:${s}`;
            if (!isManual && lastAnnouncedTime === currentTimeKey) return;
            lastAnnouncedTime = currentTimeKey;

            synth.cancel();
            const masterVol = parseFloat(volInput.value);
            const volEn = parseFloat(volInputEn.value);
            const volJa = parseFloat(volInputJa.value);

            const processTemplate = (tpl) => tpl.replace(/{h}/g, h).replace(/{m}/g, m).replace(/{s}/g, s);
            
            timerCard.classList.add('is-speaking');
            statusBadge.textContent = "Speaking...";
            statusBadge.classList.add('speaking');

            const uEn = new SpeechSynthesisUtterance(processTemplate(templateEn.value));
            uEn.voice = allVoices[voiceSelectEn.value];
            uEn.rate = parseFloat(rateInputEn.value);
            uEn.volume = masterVol * volEn;

            const uJa = new SpeechSynthesisUtterance(processTemplate(templateJa.value));
            uJa.voice = allVoices[voiceSelectJa.value];
            uJa.rate = parseFloat(rateInputJa.value);
            uJa.volume = masterVol * volJa;

            uJa.onend = () => {
                timerCard.classList.remove('is-speaking');
                statusBadge.textContent = "Active";
                statusBadge.classList.remove('speaking');
            };
            uEn.onend = () => { setTimeout(() => synth.speak(uJa), 300); };
            synth.speak(uEn);
        }

        function tick() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            dateDisplay.textContent = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')} (${weekdays[now.getDay()]})`;
            clockDisplay.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (targetMinutes.includes(m) && targetSeconds.includes(s)) announce(h, m, s);
            requestAnimationFrame(tick);
        }

        function runTest(e) {
            if (e && e.clientX) createRipple(e);
            const d = new Date();
            announce(d.getHours(), d.getMinutes(), d.getSeconds(), true);
        }

        function main() {
            // Event Listeners
            themeSelect.onchange = (e) => {
                applyTheme(e.target.value);
                saveSettings();
            };

            toggleSettingsBtn.onclick = (e) => {
                e.stopPropagation();
                settingsBody.classList.toggle('collapsed');
                toggleText.textContent = settingsBody.classList.contains('collapsed') ? "Show Settings" : "Hide Settings";
                saveSettings();
            };

            ambientTestTrigger.onclick = runTest;
            
            volInput.oninput = (e) => {
                volValue.textContent = `${Math.round(e.target.value * 100)}%`;
            };
            volInputEn.oninput = (e) => {
                volValueEn.textContent = `${Math.round(e.target.value * 100)}%`;
            };
            volInputJa.oninput = (e) => {
                volValueJa.textContent = `${Math.round(e.target.value * 100)}%`;
            };

            document.querySelectorAll('input, select, textarea').forEach(el => {
                el.addEventListener('change', saveSettings); // 'change' is better for performance on range sliders
                el.addEventListener('click', (e) => e.stopPropagation());
            });

            // Initial Load
            loadSettings();
            setupVoices();
            if (synth.onvoiceschanged !== undefined) {
                synth.onvoiceschanged = setupVoices;
            }
            requestAnimationFrame(tick);
        }

        // --- App Starter ---
        startupButton.addEventListener('click', () => {
            // Unlock audio context
            synth.cancel();
            const dummyUtterance = new SpeechSynthesisUtterance(' ');
            dummyUtterance.volume = 0;
            synth.speak(dummyUtterance);
            
            // Hide overlay
            startupOverlay.style.opacity = '0';
            setTimeout(() => {
                startupOverlay.style.display = 'none';
            }, 500);

            // Start the main application
            main();
        });
    </script>
</body>
</html>
