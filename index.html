<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Clock - Minimal Voice Announcer</title>
    <style>
        /* モダンなグラスモーフィズム・デザイン */
        :root {
            --bg-color: #0f0f0f;
            --accent-color: #007aff;
            --text-color: #e0e0e0;
            --border-color: #333;
            --card-bg: rgba(30, 30, 30, 0.85);
            --grad-start: #1a1a2e;
            --grad-end: #0f0f0f;
            --clock-color: #ffffff;
            --input-bg: #2a2a2a;
            --input-text: #ffffff;
            --error-color: #ff3b30;
        }

        /* サイバーマトリックス・テーマ */
        .theme-cyberpunk {
            --bg-color: #020617;
            --accent-color: #22c55e;
            --text-color: #f0fdf4;
            --card-bg: rgba(15, 23, 42, 0.9);
            --grad-start: #064e3b;
            --grad-end: #020617;
            --clock-color: #22c55e;
            --border-color: #065f46;
            --input-bg: #0f172a;
            --input-text: #22c55e;
        }

        /* ピュアホワイト・テーマ */
        .theme-soft {
            --bg-color: #f8fafc;
            --accent-color: #f43f5e;
            --text-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.9);
            --grad-start: #ffe4e6;
            --grad-end: #f8fafc;
            --clock-color: #0f172a;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --input-text: #0f172a;
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            transition: background-color 0.5s ease;
        }

        #startupOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #startupButton {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #startupButton:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 122, 255, 0.5);
        }

        .app-container {
            display: flex;
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at 50% 50%, var(--grad-start) 0%, var(--grad-end) 100%);
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            box-sizing: border-box;
            transition: background 0.5s ease;
            position: relative;
        }

        .timer-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 30px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.12);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 1;
            cursor: default;
            overflow: hidden;
        }

        .timer-card:has(#settingsBody.collapsed) {
            max-width: 620px;
            padding: 60px 40px;
        }

        .timer-card.is-speaking {
            transform: scale(1.03);
            box-shadow: 0 40px 80px rgba(0, 122, 255, 0.3);
            border-color: var(--accent-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .status-badge {
            padding: 6px 12px;
            background: rgba(0, 122, 255, 0.1);
            color: var(--accent-color);
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 122, 255, 0.1);
        }

        .status-badge.speaking {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .settings-toggle {
            background: rgba(128, 128, 128, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-color);
            padding: 10px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 13px;
            font-weight: bold;
        }

        .date-display {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-color);
            opacity: 0.8;
            letter-spacing: 0.05em;
            margin-bottom: 0px;
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .timer-card:has(#settingsBody.collapsed) .date-display {
            font-size: 44px;
            margin-bottom: 12px;
            opacity: 1;
        }

        .clock-display {
            font-size: clamp(48px, 15vw, 88px);
            font-weight: 500;
            text-align: center;
            margin: 0px 0 30px;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            color: var(--clock-color);
            text-shadow: 0 0 15px rgba(0,0,0,0.1);
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .timer-card:has(#settingsBody.collapsed) .clock-display {
            font-size: clamp(60px, 20vw, 140px);
            margin: 15px 0 15px;
            font-weight: 400;
            letter-spacing: -4px;
        }

        #settingsBody {
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 2000px;
            opacity: 1;
            position: relative;
            z-index: 10;
        }

        #settingsBody.collapsed {
            max-height: 0 !important;
            opacity: 0 !important;
            pointer-events: none;
        }

        .control-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            margin-top: 10px;
        }

        .settings-panel {
            background: rgba(0,0,0,0.1);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 10px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .settings-panel.is-testing {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.2);
        }

        label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-color);
            opacity: 0.6;
            margin-bottom: 6px;
            display: block;
        }

        select, textarea, input, .test-button {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--input-text);
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-size: 13px;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .test-button {
            margin-top: 8px;
            cursor: pointer;
        }

        .dual-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        #ambientTestTrigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 0;
            outline: none;
        }

        .ripple {
            position: absolute;
            background: var(--accent-color);
            opacity: 0.4;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear;
            pointer-events: none;
            z-index: 5;
        }

        #wakeLockStatus {
            font-size: 9px;
            color: var(--error-color);
            margin-top: 4px;
            display: none;
        }

        @keyframes ripple-effect {
            to { transform: scale(4); opacity: 0; }
        }

        @media (max-width: 480px) {
            .timer-card { padding: 20px; }
            .dual-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body id="rootBody">

    <div id="startupOverlay">
        <button id="startupButton">Start Clock</button>
    </div>

    <div class="app-container" id="mainBg">
        <div class="timer-card" id="timerCard">
            <button id="ambientTestTrigger" title="Click to test playback"></button>
            <div class="card-header">
                <div class="status-badge" id="statusBadge">Active</div>
                <button class="settings-toggle" id="toggleSettings">
                    <span id="toggleText">Show Settings</span> ⚙️
                </button>
            </div>
            <div class="date-display" id="dateDisplay">----.--.-- (---)</div>
            <div class="clock-display" id="clock">00:00:00</div>
            <div id="settingsBody">
                <div class="control-section">
                    <div class="dual-grid">
                        <div class="control-group">
                            <label>Theme</label>
                            <select id="themeSelect">
                                <option value="default">Midnight</option>
                                <option value="theme-cyberpunk">Cyber Matrix</option>
                                <option value="theme-soft">Pure White</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>Master Volume: <span id="volValue">80%</span></label>
                            <input type="range" id="volInput" min="0" max="2" step="0.05" value="0.8">
                        </div>
                    </div>
                    
                    <div id="wakeLockGroup" class="control-group">
                        <label for="wakeLockCheckbox" style="display: flex; align-items: center; gap: 8px; cursor: pointer; justify-content: space-between;">
                            Keep Screen On
                            <input type="checkbox" id="wakeLockCheckbox" style="width: auto; height: 20px; accent-color: var(--accent-color);">
                        </label>
                        <div id="wakeLockStatus">Permission denied by browser environment.</div>
                    </div>

                    <div class="settings-panel" id="panelEn">
                        <label style="color: var(--accent-color);">English Voice</label>
                        <div class="dual-grid">
                            <select id="voiceSelectEn"></select>
                            <input type="number" id="rateInputEn" min="0.5" max="2.0" step="0.1" value="1.0">
                        </div>
                        <div class="control-group" style="margin-top:8px">
                            <label>Volume: <span id="volValueEn">100%</span></label>
                            <input type="range" id="volInputEn" min="0" max="1.5" step="0.05" value="1.0">
                        </div>
                        <textarea id="templateEn" style="margin-top:8px">It's {h} {m} and {s} seconds.</textarea>
                        <button id="testSpeakEn" class="test-button">Test Speak</button>
                    </div>
                    <div class="settings-panel" id="panelJa">
                        <label style="color: var(--accent-color);">Japanese Voice</label>
                        <div class="dual-grid">
                            <select id="voiceSelectJa"></select>
                            <input type="number" id="rateInputJa" min="0.5" max="2.0" step="0.1" value="1.0">
                        </div>
                        <div class="control-group" style="margin-top:8px">
                            <label>Volume: <span id="volValueJa">100%</span></label>
                            <input type="range" id="volInputJa" min="0" max="1.5" step="0.05" value="1.0">
                        </div>
                        <textarea id="templateJa" style="margin-top:8px">{h}時{m}分{s}秒です</textarea>
                        <button id="testSpeakJa" class="test-button">Test Speak</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DOM Elements ---
        const startupOverlay = document.getElementById('startupOverlay');
        const startupButton = document.getElementById('startupButton');
        const rootBody = document.getElementById('rootBody');
        const timerCard = document.getElementById('timerCard');
        const statusBadge = document.getElementById('statusBadge');
        const toggleSettingsBtn = document.getElementById('toggleSettings');
        const toggleText = document.getElementById('toggleText');
        const dateDisplay = document.getElementById('dateDisplay');
        const clockDisplay = document.getElementById('clock');
        const settingsBody = document.getElementById('settingsBody');
        const themeSelect = document.getElementById('themeSelect');
        const volInput = document.getElementById('volInput');
        const volValue = document.getElementById('volValue');
        const volInputEn = document.getElementById('volInputEn');
        const volValueEn = document.getElementById('volValueEn');
        const volInputJa = document.getElementById('volInputJa');
        const volValueJa = document.getElementById('volValueJa');
        const voiceSelectEn = document.getElementById('voiceSelectEn');
        const rateInputEn = document.getElementById('rateInputEn');
        const templateEn = document.getElementById('templateEn');
        const voiceSelectJa = document.getElementById('voiceSelectJa');
        const rateInputJa = document.getElementById('rateInputJa');
        const templateJa = document.getElementById('templateJa');
        const ambientTestTrigger = document.getElementById('ambientTestTrigger');
        const wakeLockCheckbox = document.getElementById('wakeLockCheckbox');
        const wakeLockStatus = document.getElementById('wakeLockStatus');
        const testSpeakEnBtn = document.getElementById('testSpeakEn');
        const testSpeakJaBtn = document.getElementById('testSpeakJa');
        const panelEn = document.getElementById('panelEn');
        const panelJa = document.getElementById('panelJa');

        // --- Settings & State ---
        const targetMinutes = [0, 7, 15, 22, 30, 37, 45, 52];
        const targetSeconds = [0, 30];
        const synth = window.speechSynthesis;
        let allVoices = [];
        const STORAGE_KEY = 'speaking_clock_v1_final';
        let lastAnnouncedTime = "";
        const weekdays = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
        let wakeLock = null;

        // --- Functions ---
        const requestWakeLock = async () => {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLockStatus.style.display = 'none';
            } catch (err) {
                console.warn('Wake Lock failed (likely due to iframe/permissions policy).');
                wakeLockStatus.style.display = 'block';
                wakeLockCheckbox.checked = false;
                saveSettings();
            }
        };

        const releaseWakeLock = async () => {
            if (wakeLock) {
                try {
                    await wakeLock.release();
                } catch(e) {}
                wakeLock = null;
            }
        };
        
        function applyTheme(themeName) {
            // bodyに直接クラスを適用
            rootBody.className = (themeName === 'default') ? '' : themeName;
        }

        function saveSettings() {
            const isCollapsed = settingsBody.classList.contains('collapsed');
            const data = {
                theme: themeSelect.value,
                vol: volInput.value,
                volEn: volInputEn.value,
                volJa: volInputJa.value,
                vEn: voiceSelectEn.value,
                vJa: voiceSelectJa.value,
                tEn: templateEn.value,
                tJa: templateJa.value,
                rEn: rateInputEn.value,
                rJa: rateInputJa.value,
                wakeLock: wakeLockCheckbox.checked,
                isCollapsed: isCollapsed
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadSettings() {
            const raw = localStorage.getItem(STORAGE_KEY);
            const defaults = {
                theme: 'default', vol: 0.8, volEn: 1.0, volJa: 1.0,
                tEn: "It's {lts}.",
                tJa: "{lts}です",
                rEn: 1.0, rJa: 1.0, isCollapsed: true,
                wakeLock: false
            };
            const loaded = raw ? JSON.parse(raw) : {};
            const s = { ...defaults, ...loaded };
            
            themeSelect.value = s.theme;
            volInput.value = s.vol;
            volInputEn.value = s.volEn;
            volInputJa.value = s.volJa;
            templateEn.value = s.tEn;
            templateJa.value = s.tJa;
            rateInputEn.value = s.rEn;
            rateInputJa.value = s.rJa;
            wakeLockCheckbox.checked = s.wakeLock;

            // 初期ロード時にテーマを適用
            applyTheme(s.theme);
            
            volValue.textContent = `${Math.round(s.vol * 100)}%`;
            volValueEn.textContent = `${Math.round(s.volEn * 100)}%`;
            volValueJa.textContent = `${Math.round(s.volJa * 100)}%`;

            if (s.isCollapsed) {
                settingsBody.classList.add('collapsed');
                toggleText.textContent = "Show Settings";
            } else {
                settingsBody.classList.remove('collapsed');
                toggleText.textContent = "Hide Settings";
            }
            
            if (s.wakeLock) {
                requestWakeLock();
            }

            window._tmpVEn = s.vEn;
            window._tmpVJa = s.vJa;
        }

        function setupVoices() {
            allVoices = synth.getVoices();
            if (allVoices.length === 0) return;

            const fEn = allVoices.map((v, i) => ({v, i})).filter(x => x.v.lang.includes('en-'));
            const fJa = allVoices.map((v, i) => ({v, i})).filter(x => x.v.lang.includes('ja-'));
            
            voiceSelectEn.innerHTML = fEn.map(x => `<option value="${x.i}">${x.v.name}</option>`).join('');
            voiceSelectJa.innerHTML = fJa.map(x => `<option value="${x.i}">${x.v.name}</option>`).join('');
            
            if (window._tmpVEn !== undefined) voiceSelectEn.value = window._tmpVEn;
            if (window._tmpVJa !== undefined) voiceSelectJa.value = window._tmpVJa;
        }

        function processTemplate(tpl, lang, {h, m, s, now} = {}) {
            return tpl.replace(/{h}/g, h)
                .replace(/{m}/g, m)
                .replace(/{s}/g, s)
                .replace(/{lts}/g, now.toLocaleTimeString(lang === 'en' ? 'en-US' : 'ja-JP', {
                    /*
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                    */
                }))
            ;
        }

        function testSpeak(lang) {
            synth.cancel();

            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            
            const masterVol = parseFloat(volInput.value);

            let utterance;
            let targetPanel;
            const tmpArgs = {h, m, s, now};
            if (lang === 'en') {
                const volEn = parseFloat(volInputEn.value);
                utterance = new SpeechSynthesisUtterance(processTemplate(templateEn.value, lang, tmpArgs));
                utterance.voice = allVoices[voiceSelectEn.value];
                utterance.rate = parseFloat(rateInputEn.value);
                utterance.volume = masterVol * volEn;
                targetPanel = panelEn;
            } else if (lang === 'ja') {
                const volJa = parseFloat(volInputJa.value);
                utterance = new SpeechSynthesisUtterance(processTemplate(templateJa.value, lang, tmpArgs));
                utterance.voice = allVoices[voiceSelectJa.value];
                utterance.rate = parseFloat(rateInputJa.value);
                utterance.volume = masterVol * volJa;
                targetPanel = panelJa;
            }

            if(utterance) {
                utterance.onstart = () => {
                    targetPanel.classList.add('is-testing');
                    statusBadge.textContent = "Testing...";
                    statusBadge.classList.add('speaking');
                };
                const onEnd = () => {
                    targetPanel.classList.remove('is-testing');
                    statusBadge.textContent = "Active";
                    statusBadge.classList.remove('speaking');
                };
                utterance.onend = onEnd;
                utterance.onerror = onEnd;
                synth.speak(utterance);
            }
        }

        function announce(h, m, s, isManual = false) {
            const currentTimeKey = `${h}:${m}:${s}`;
            if (!isManual && lastAnnouncedTime === currentTimeKey) return;
            lastAnnouncedTime = currentTimeKey;

            synth.cancel();
            const masterVol = parseFloat(volInput.value);
            const volEn = parseFloat(volInputEn.value);
            const volJa = parseFloat(volInputJa.value);

            timerCard.classList.add('is-speaking');
            statusBadge.textContent = "Speaking...";
            statusBadge.classList.add('speaking');

            const tmpArgs = {h, m, s, now: new Date()};
            const uEn = new SpeechSynthesisUtterance(processTemplate(templateEn.value, 'en', tmpArgs));
            uEn.voice = allVoices[voiceSelectEn.value];
            uEn.rate = parseFloat(rateInputEn.value);
            uEn.volume = masterVol * volEn;

            const uJa = new SpeechSynthesisUtterance(processTemplate(templateJa.value, 'ja', tmpArgs));
            uJa.voice = allVoices[voiceSelectJa.value];
            uJa.rate = parseFloat(rateInputJa.value);
            uJa.volume = masterVol * volJa;

            const onEnd = () => {
                timerCard.classList.remove('is-speaking');
                statusBadge.textContent = "Active";
                statusBadge.classList.remove('speaking');
            };
            uJa.onend = onEnd;
            uJa.onerror = onEnd;
            uEn.onerror = onEnd;

            uEn.onend = () => { setTimeout(() => synth.speak(uJa), 300); };
            synth.speak(uEn);
        }

        function tick() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            dateDisplay.textContent = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')} (${weekdays[now.getDay()]})`;
            clockDisplay.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (targetMinutes.includes(m) && targetSeconds.includes(s)) announce(h, m, s);
            requestAnimationFrame(tick);
        }

        function main() {
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && wakeLockCheckbox.checked) {
                    requestWakeLock();
                }
            });

            // テーマ選択の変更イベントを追加
            themeSelect.onchange = () => {
                applyTheme(themeSelect.value);
                saveSettings();
            };

            wakeLockCheckbox.onchange = () => {
                if (wakeLockCheckbox.checked) {
                    requestWakeLock();
                } else {
                    releaseWakeLock();
                }
                saveSettings();
            };
            
            testSpeakEnBtn.onclick = (e) => { e.stopPropagation(); testSpeak('en'); };
            testSpeakJaBtn.onclick = (e) => { e.stopPropagation(); testSpeak('ja'); };
            ambientTestTrigger.onclick = (e) => {
                const rect = timerCard.getBoundingClientRect();
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = `${size}px`;
                ripple.style.left = `${e.clientX - rect.left - size/2}px`;
                ripple.style.top = `${e.clientY - rect.top - size/2}px`;
                timerCard.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
                const d = new Date();
                announce(d.getHours(), d.getMinutes(), d.getSeconds(), true);
            };
            
            volInput.oninput = (e) => volValue.textContent = `${Math.round(e.target.value * 100)}%`;
            volInputEn.oninput = (e) => volValueEn.textContent = `${Math.round(e.target.value * 100)}%`;
            volInputJa.oninput = (e) => volValueJa.textContent = `${Math.round(e.target.value * 100)}%`;

            document.querySelectorAll('input, select, textarea').forEach(el => {
                // themeSelectは別途onchangeで処理しているので除外しても良いが、一括保存のため残す
                el.addEventListener('change', saveSettings);
                el.addEventListener('click', (e) => e.stopPropagation());
            });
            
            toggleSettingsBtn.onclick = (e) => {
                e.stopPropagation();
                settingsBody.classList.toggle('collapsed');
                toggleText.textContent = settingsBody.classList.contains('collapsed') ? "Show Settings" : "Hide Settings";
                saveSettings();
            };

            loadSettings();
            setupVoices();
            if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = setupVoices;
            requestAnimationFrame(tick);
        }

        startupButton.onclick = () => {
            synth.cancel();
            synth.speak(new SpeechSynthesisUtterance(' '));
            startupOverlay.style.opacity = '0';
            setTimeout(() => startupOverlay.style.display = 'none', 500);
            main();
        };
    </script>
</body>
</html>
