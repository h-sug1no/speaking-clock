<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Clock - Minimal Voice Announcer</title>
    <style>
        /* モダンなグラスモーフィズム・デザイン */
        :root {
            --bg-color: #0f0f0f;
            --accent-color: #007aff;
            --text-color: #e0e0e0;
            --border-color: #666;
            --card-bg: rgba(30, 30, 30, 0.85);
            --grad-start: #1a1a2e;
            --grad-end: #0f0f0f;
            --clock-color: #d0d0d0;
            --input-bg: #2a2a2a;
            --input-text: #ffffff;
            --error-color: #ff3b30;
            --label-width: 84px;
            --focus-outline: 2px solid #4C9BFF;
            --section-gap: 16px;

            --scale-x: 1;
            --scale-y: 1;
            --letter-spacing: 0;
        }

        /* サイバーマトリックス・テーマ */
        .theme-cyberpunk {
            --bg-color: #020617;
            --accent-color: #22c55e;
            --text-color: #f0fdf4;
            --card-bg: rgba(15, 23, 42, 0.9);
            --grad-start: #064e3b;
            --grad-end: #020617;
            --clock-color: #22c55e;
            --border-color: #065f46;
            --input-bg: #0f172a;
            --input-text: #22c55e;
            --focus-outline: 2px solid #22c55e;
        }

        /* ピュアホワイト・テーマ */
        .theme-soft {
            --bg-color: #f8fafc;
            --accent-color: #f43f5e;
            --text-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.9);
            --grad-start: #ffe4e6;
            --grad-end: #f8fafc;
            --clock-color: #0f172a;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --input-text: #0f172a;
            --focus-outline: 2px solid #f43f5e;
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            transition: background-color 0.5s ease;
        }

        #startupOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        #startupButton {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #startupButton:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 122, 255, 0.5);
        }

        .app-container {
            display: flex;
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at 50% 50%, var(--grad-start) 0%, var(--grad-end) 100%);
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            box-sizing: border-box;
            transition: background 0.5s ease;
            position: relative;
        }

        .timer-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 30px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.12);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 1;
            cursor: default;
            overflow: hidden;
        }

        .timer-card:has(#settingsBody.collapsed) {
            max-width: 620px;
            padding: 60px 40px;
        }

        .timer-card.is-speaking {
            transform: scale(1.03);
            box-shadow: 0 40px 80px rgba(0, 122, 255, 0.3);
            border-color: var(--accent-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .status-badge {
            padding: 6px 12px;
            background: rgba(0, 122, 255, 0.1);
            color: var(--accent-color);
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 122, 255, 0.1);
        }
        .status-badge.wake-lock-active::before {
            content:'🔆 '
        }

        .status-badge.speaking {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .settings-toggle {
            background: rgba(128, 128, 128, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-color);
            padding: 10px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 13px;
            font-weight: bold;
        }

        .date-display {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 0px;
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .timer-card:has(#settingsBody.collapsed) .date-display {
            font-size: 44px;
            margin-bottom: 12px;
            opacity: 1;
        }

        #clockContent {
            font-variant-numeric: tabular-nums;
            transform: scale(var(--scale-x), var(--scale-y));
        }

        #clockContent .clock-display, #clockContent .date-display {
            letter-spacing: calc(var(--letter-spacing) * 1em);
            transition: transform 0.1s ease-out, letter-spacing 0.1s ease-out;
        }

        .clock-display {
            font-size: clamp(48px, 15vw, 88px);
            font-weight: 500;
            text-align: center;
            margin: 0px 0 30px;
            font-variant-numeric: tabular-nums;
            color: var(--clock-color);
            text-shadow: 0 0 15px rgba(0,0,0,0.1);
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .timer-card:has(#settingsBody.collapsed) .clock-display {
            font-size: clamp(60px, 20vw, 140px);
            margin: 15px 0 15px;
            font-weight: 400;
            letter-spacing: -4px;
        }

        #settingsBody {
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 2000px;
            opacity: 1;
            position: relative;
            z-index: 10;
            padding: 16px;
        }

        #settingsBody.collapsed {
            max-height: 0 !important;
            opacity: 0 !important;
            pointer-events: none;
        }

        .control-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            margin-top: 10px;
        }

        .clock-styles-controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .settings-panel {
            background: rgba(0,0,0,0.1);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: var(--section-gap);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .settings-panel.is-testing {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.2);
        }

        .clock-styles-controls-area {
            margin-top: var(--section-gap);
        }

        .clock-styles-controls-area .footer {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
        }

        label, .panel-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-color);
            opacity: 0.6;
            margin-bottom: 3px;
            display: block;
        }

        .control-group label {
            display: block;
            margin-bottom: 3px;
        }
        .control-group input[type="range"] {
            height: 1rem;
            margin-top: -0.1rem;
        }

        .range-value[data-state="low"] {
            font-weight: normal;
            font-style: italic;
        }
        .range-value[data-state="mid"] {
            font-weight: normal;
        }
        .range-value[data-state="high"] {
            font-weight: bold;
        }
        select, textarea, input, .sc-button {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--input-text);
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-size: 13px;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        select:focus, textarea:focus, input:focus, .sc-button:focus {
            outline: var(--focus-outline);
        }

        .sc-button:hover {
            background: rgba(0, 122, 255, 0.15);
            transform: translateY(-1px);
        }

        .sc-button:active {
            transform: translateY(0);
        }

        .settings-panel.is-testing .test-speak-button {
            background: var(--accent-color);
            color: #fff;
        }

        .sc-button {
            margin-top: 8px;
            cursor: pointer;
        }

        .dual-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }

        #ambientTestTrigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 0;
            outline: none;
        }

        .ripple {
            position: absolute;
            background: var(--accent-color);
            opacity: 0.4;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear;
            pointer-events: none;
            z-index: 5;
        }

        #wakeLockStatus {
            font-size: 9px;
            color: var(--error-color);
            margin-top: 4px;
            display: none;
        }

        @keyframes ripple-effect {
            to { transform: scale(4); opacity: 0; }
        }

        @media (max-width: 480px) {
            .timer-card { padding: 20px; }
            .dual-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body id="rootBody">

    <div id="startupOverlay">
        <button id="startupButton" autofocus>Start Clock</button>
    </div>

    <div class="app-container" id="mainBg">
        <div class="timer-card" id="timerCard">
            <button id="ambientTestTrigger" title="Click to test playback"></button>
            <div class="card-header">
                <div class="status-badge" id="statusBadge">Active</div>
                <button class="settings-toggle" id="toggleSettings">
                    <span id="toggleText">Show Settings</span> ⚙️
                </button>
            </div>
            <div id="clockContent">
                <div class="date-display" id="dateDisplay">----.--.-- (---)</div>
                <div class="clock-display" id="clock">00:00:00</div>
            </div>
            <div id="settingsBody">
                <div class="control-section">
                    <div id="wakeLockGroup" class="control-group">
                        <label for="wakeLockCheckbox" style="display: flex; align-items: center; gap: 8px; cursor: pointer; justify-content: space-between;">
                            Keep Screen On
                            <input type="checkbox" id="wakeLockCheckbox" style="width: auto; height: 20px; accent-color: var(--accent-color);">
                        </label>
                        <div id="wakeLockStatus">Permission denied by browser environment.</div>
                    </div>
                    <div class="dual-grid">
                        <div class="control-group">
                            <label for="themeSelect">Theme</label>
                            <select id="themeSelect">
                                <option value="default">Midnight</option>
                                <option value="theme-cyberpunk">Cyber Matrix</option>
                                <option value="theme-soft">Pure White</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label for="volInput">Master Volume: <span class="range-value" id="volValue">80%</span></label>
                            <input type="range" id="volInput" min="0" max="2" step="0.05" value="0.8">
                        </div>
                    </div>
                    <div id="fontSelectGroup" class="control-group">
                        <label for="fontSelect" style="display: flex; align-items: center; gap: 8px; cursor: pointer; justify-content: space-between;">
                            Font
                        </label>
                        <select id="fontSelector">
                            <option value="system-ui">system-ui</option>
                            <option value="ui-serif">ui-serif</option>
                            <option value="ui-sans-serif">ui-sans-serif</option>
                            <option value="ui-monospace" selected>ui-monospace</option>
                            <option value="ui-rounded">ui-rounded</option>
                            <option value="serif">serif</option>
                            <option value="sans-serif">sans-serif</option>
                            <option value="monospace">monospace</option>
                            <option value="cursive">cursive</option>
                            <option value="fantasy">fantasy</option>
                            <option value="math">math</option>
                            <option value="fangsong">fangsong</option>
                        </select>
                    </div>
                    <div class="clock-styles-controls-area">
                        <div class="panel-title">Clock Styles</div>
                        <div class="clock-styles-controls-grid settings-panel">
                            <!-- Scale X -->
                            <div class="control-group">
                                <label for="inputScaleX">Scale X</label>
                                <input type="number" id="inputScaleX" step="0.05" value="1.0">
                            </div>

                            <!-- Scale Y -->
                            <div class="control-group">
                                <label for="inputScaleY">Scale Y</label>
                                <input type="number" id="inputScaleY" step="0.05" value="1.0">
                            </div>

                            <!-- Letter Spacing -->
                            <div class="control-group">
                                <label for="inputLS">Letter Spacing</label>
                                <input type="number" id="inputLS" step="0.01" value="0">
                            </div>
                            <!-- Reset Button -->
                            <div class="footer">
                                <button id="resetBtn" class="sc-button">Reset</button>
                            </div>
                        </div>
                    </div>

                    <div class="settings-panel" id="panel0">
                        <div class="dual-grid">
                            <div class="control-group">
                                <label>Language</label>
                                <select class="langSelect" data-panel="0"></select>
                            </div>
                        </div>
                        <div class="control-group">
                            <label for="voiceSelect0">Voice</label>
                            <select id="voiceSelect0"></select>
                        </div>
                        <div class="control-group" style="margin-top:16px">
                            <label for="rateInput0">Rate: <span class="range-value" id="rateValue0">1.0</span></label>
                            <input type="range" id="rateInput0" min="0.5" max="2.0" step="0.1" value="1.0">
                        </div>
                        <div class="control-group" style="margin-top:8px">
                            <label>Volume: <span class="range-value" id="volValue0">100%</span></label>
                            <input type="range" id="volInput0" min="0" max="1.5" step="0.05" value="1.0">
                        </div>
                        <div style="display: flex; gap: 8px; align-items: flex-start; margin-top: 8px;">
                            <textarea id="template0" style="flex: 1;" placeholder="Enter Speech template..."></textarea>
                            <button id="resetTemplate0" title="Reset Speech Template" class="sc-button" style="width: 40px; height: 40px; padding: 0; font-size: 16px; flex-shrink: 0;">🔄</button>
                        </div>
                        <button id="testSpeak0" class="sc-button test-speak-button">Test Speak</button>
                    </div>
                    <div class="settings-panel" id="panel1">
                        <div class="dual-grid">
                            <div class="control-group">
                                <label>Language</label>
                                <select class="langSelect" data-panel="1"></select>
                            </div>
                        </div>
                        <div class="control-group">
                            <label for="voiceSelect1">Voice</label>
                            <select id="voiceSelect1"></select>
                        </div>
                        <div class="control-group" style="margin-top:16px">
                            <label for="rateInput1">Rate: <span class="range-value" id="rateValue1">1.0</span></label>
                            <input type="range" id="rateInput1" min="0.5" max="2.0" step="0.1" value="1.0">
                        </div>
                        <div class="control-group" style="margin-top:8px">
                            <label>Volume: <span class="range-value" id="volValue1">100%</span></label>
                            <input type="range" id="volInput1" min="0" max="1.5" step="0.05" value="1.0">
                        </div>
                        <div style="display: flex; gap: 8px; align-items: flex-start; margin-top: 8px;">
                            <textarea id="template1" style="flex: 1;" placeholder="Enter Speech template..."></textarea>
                            <button id="resetTemplate1" title="Reset Speech Template" class="sc-button" style="width: 40px; height: 40px; padding: 0; font-size: 16px; flex-shrink: 0;">🔄</button>
                        </div>
                        <button id="testSpeak1" class="sc-button test-speak-button">Test Speak</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Speech Profiles Configuration (BCP 47 format) ---
        const speechProfiles = [
            {
                panelId: 'panel0',
                voiceSelectId: 'voiceSelect0',
                rateInputId: 'rateInput0',
                volInputId: 'volInput0',
                volValueId: 'volValue0',
                templateId: 'template0',
                testBtnId: 'testSpeak0',
                defaultTemplate: "It's {lts}.",
                defaultLang: 'en-US'
            },
            {
                panelId: 'panel1',
                voiceSelectId: 'voiceSelect1',
                rateInputId: 'rateInput1',
                volInputId: 'volInput1',
                volValueId: 'volValue1',
                templateId: 'template1',
                testBtnId: 'testSpeak1',
                defaultTemplate: "{lts}です",
                defaultLang: 'ja-JP'
            }
        ];

        // Panel language tracking: keyed by panel index, value is lang (BCP 47 format)
        const panelLanguages = {};

        // --- DOM Elements ---
        const startupOverlay = document.getElementById('startupOverlay');
        const startupButton = document.getElementById('startupButton');
        const rootBody = document.getElementById('rootBody');
        const timerCard = document.getElementById('timerCard');
        const statusBadge = document.getElementById('statusBadge');
        const toggleSettingsBtn = document.getElementById('toggleSettings');
        const toggleText = document.getElementById('toggleText');
        const dateDisplay = document.getElementById('dateDisplay');
        const clockDisplay = document.getElementById('clock');
        const settingsBody = document.getElementById('settingsBody');
        const themeSelect = document.getElementById('themeSelect');
        const volInput = document.getElementById('volInput');
        const volValue = document.getElementById('volValue');
        const ambientTestTrigger = document.getElementById('ambientTestTrigger');
        const wakeLockCheckbox = document.getElementById('wakeLockCheckbox');
        const wakeLockStatus = document.getElementById('wakeLockStatus');
        const fontSelector = document.getElementById('fontSelector');
        const clockContent = document.getElementById('clockContent');

        const applyClockFont = (font) => {
            clockContent.style.fontFamily = font;
        };
        fontSelector.addEventListener('change', (e) => {
            applyClockFont(e.target.value);
        });

        // Language-specific elements
        const languageElements = {};
        speechProfiles.forEach((profile, index) => {
            languageElements[index] = {
                panel: document.getElementById(profile.panelId),
                voiceSelect: document.getElementById(profile.voiceSelectId),
                rateInput: document.getElementById(profile.rateInputId),
                rateValue: document.getElementById(`rateValue${index}`),
                volInput: document.getElementById(profile.volInputId),
                volValue: document.getElementById(profile.volValueId),
                template: document.getElementById(profile.templateId),
                testBtn: document.getElementById(profile.testBtnId),
                langSelect: document.querySelector(`select[data-panel="${index}"]`)
            };
            panelLanguages[index] = languageElements[index].langSelect.value;
        });

        // Reset template buttons
        speechProfiles.forEach((profile, index) => {
            const resetBtn = document.getElementById(`resetTemplate${index}`);
            resetBtn.addEventListener('click', () => {
                languageElements[index].template.value = profile.defaultTemplate;
                saveSettings();
            });
        });

        // --- Settings & State ---
        const targetMinutes = [0, 7, 15, 22, 30, 37, 45, 52];
        const targetSeconds = [0, 30];
        const synth = window.speechSynthesis;
        let voiceMapByVoiceURI = {};
        const STORAGE_KEY = 'speaking_clock_v1.1_final';
        let lastAnnouncedTime = "";
        const weekdays = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
        let wakeLock = null;

        // --- Functions ---
        const requestWakeLock = async () => {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLockStatus.style.display = 'none';
                statusBadge.classList.add('wake-lock-active');
            } catch (err) {
                console.warn('Wake Lock failed (likely due to iframe/permissions policy).');
                wakeLockStatus.style.display = 'block';
                wakeLockCheckbox.checked = false;
                saveSettings();
            }
        };

        const releaseWakeLock = async () => {
            if (wakeLock) {
                try {
                    await wakeLock.release();
                } catch(e) {}
                wakeLock = null;
            }
            statusBadge.classList.remove('wake-lock-active');
        };
        
        function applyTheme(themeName) {
            // bodyに直接クラスを適用
            rootBody.className = (themeName === 'default') ? '' : themeName;
        }

        function saveSettings() {
            const isCollapsed = settingsBody.classList.contains('collapsed');
            const data = {
                theme: themeSelect.value,
                vol: volInput.value,
                wakeLock: wakeLockCheckbox.checked,
                isCollapsed: isCollapsed,
                panelLanguages: panelLanguages,
                font: fontSelector.value,
                scaleX: inputScaleX.value,
                scaleY: inputScaleY.value,
                letterSpacing: inputLS.value
            };
            speechProfiles.forEach((profile, index) => {
                const elems = languageElements[index];
                const langKey = (panelLanguages[index] || 'unknown').replace('-', '_');
                data[`vol_${index}_${langKey}`] = elems.volInput.value;
                data[`v_${index}_${langKey}`] = elems.voiceSelect.value;
                data[`t_${index}_${langKey}`] = elems.template.value;
                data[`r_${index}_${langKey}`] = elems.rateInput.value;
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        function updateRangeText(textContentElem, textContent, midValue, valueStr) {
            const value = parseFloat(valueStr);
            const state = value < midValue ? "low" : (value === midValue ? "mid" : "high");
            textContentElem.dataset.state = state;
            textContentElem.textContent = textContent;
        }
        function loadSettings() {
            const raw = localStorage.getItem(STORAGE_KEY);
            const defaults = {
                theme: 'default',
                vol: 0.8,
                isCollapsed: true,
                wakeLock: false,
                panelLanguages: {},
                font: 'system-ui',
                scaleX: 1.0,
                scaleY: 1.0,
                letterSpacing: 0
            };
            speechProfiles.forEach((profile, index) => {
                defaults.panelLanguages[index] = languageElements[index].langSelect.value;
                const lang = defaults.panelLanguages[index];
                const langKey = lang.replace('-', '_');
                defaults[`vol_${index}_${langKey}`] = 1.0;
                defaults[`t_${index}_${langKey}`] = profile.defaultTemplate;
                defaults[`r_${index}_${langKey}`] = 1.0;
            });
            const loaded = raw ? JSON.parse(raw) : {};
            const s = { ...defaults, ...loaded };
            
            themeSelect.value = s.theme;
            volInput.value = s.vol;
            wakeLockCheckbox.checked = s.wakeLock;
            fontSelector.value = s.font;
            inputScaleX.value = s.scaleX;
            inputScaleY.value = s.scaleY;
            inputLS.value = s.letterSpacing;

            applyClockFont(s.font);
            updateClockStyles();

            // 初期ロード時にテーマを適用
            applyTheme(s.theme);
            
            updateRangeText(volValue, `${Math.round(s.vol * 100)}%`, 1, s.vol);
            speechProfiles.forEach((profile, index) => {
                const elems = languageElements[index];
                panelLanguages[index] = s.panelLanguages?.[index] || elems.langSelect.value;
                const langKey = panelLanguages[index].replace('-', '_');
                const volKey = `vol_${index}_${langKey}`;
                const tKey = `t_${index}_${langKey}`;
                const rKey = `r_${index}_${langKey}`;
                const vKey = `v_${index}_${langKey}`;
                elems.volInput.value = s[volKey];
                elems.template.value = s[tKey];
                elems.rateInput.value = s[rKey];
                updateRangeText(elems.volValue, `${Math.round(s[volKey] * 100)}%`, 1, s[volKey]);
                updateRangeText(elems.rateValue, `${parseFloat(s[rKey]).toFixed(1)}`, 1, s[rKey]);
                window[`_tmpV_${index}_${langKey}`] = s[vKey];
            });

            if (s.isCollapsed) {
                settingsBody.classList.add('collapsed');
                toggleText.textContent = "Show Settings";
            } else {
                settingsBody.classList.remove('collapsed');
                toggleText.textContent = "Hide Settings";
            }
            
            if (s.wakeLock) {
                requestWakeLock();
            }
        }

        let synthVoices;
        function setupVoices() {
            // Initial setup: populate language selects with all available languages
            const tAllVoices = synth.getVoices();
            if (tAllVoices.length === 0) return;
            if (synthVoices && JSON.stringify(synthVoices) === JSON.stringify(tAllVoices)) return;
            synthVoices = tAllVoices;

            // Extract unique languages from available voices
            const uniqueLangs = [...new Set(tAllVoices.map(v => v.lang))].sort();
            
            tAllVoices.forEach((v) => {
                voiceMapByVoiceURI[v.voiceURI] = v;
            });

            // Update language selects with all available languages
            speechProfiles.forEach((profile, index) => {
                const elems = languageElements[index];
                const langSelect = elems.langSelect;
                
                // Build language options
                const langOptions = uniqueLangs.map(lang => `<option value="${lang}">${lang}</option>`).join('');
                langSelect.innerHTML = '<option value="" disabled class="placeholder">Select Language</option>' + langOptions;
                
                // Set default language based on profile.defaultLang
                let defaultLang = '';
                if (uniqueLangs.includes(profile.defaultLang)) {
                    defaultLang = profile.defaultLang;
                } else {
                    // Find language starting with the prefix (e.g., 'en-' for 'en-US')
                    const prefix = profile.defaultLang.split('-')[0] + '-';
                    let fallbackLang = uniqueLangs.find(lang => lang.startsWith(prefix));
                    if (!fallbackLang) {
                        // If no prefix match, try just the language code (e.g., 'ja' for 'ja-JP')
                        const langCode = profile.defaultLang.split('-')[0];
                        fallbackLang = uniqueLangs.find(lang => lang === langCode);
                    }
                    if (fallbackLang) defaultLang = fallbackLang;
                }
                
                // Restore previously selected language if available, otherwise use default
                if (panelLanguages[index] && uniqueLangs.includes(panelLanguages[index])) {
                    langSelect.value = panelLanguages[index];
                } else if (defaultLang) {
                    panelLanguages[index] = defaultLang;
                    langSelect.value = defaultLang;
                } else if (uniqueLangs.length > 0) {
                    // Fallback to first available language
                    panelLanguages[index] = uniqueLangs[0];
                    langSelect.value = uniqueLangs[0];
                }
            });

            // Update all voice selects after language setup
            speechProfiles.forEach((profile, index) => {
                updateVoiceSelect(index, panelLanguages[index]);
            });
        }

        function updateVoiceSelect(panelIndex, lang) {
            // Update voice select for a specific panel when language changes
            const tAllVoices = synth.getVoices();
            const voicesByLang = {};
            tAllVoices.forEach((v) => {
                if (!voicesByLang[v.lang]) voicesByLang[v.lang] = [];
                voicesByLang[v.lang].push(v);
            });

            const elems = languageElements[panelIndex];
            const voices = voicesByLang[lang] || [];
            const placeholderOption = '<option value="" disabled class="placeholder">Select Voice</option>';
            elems.voiceSelect.innerHTML = placeholderOption +
                voices.map(x => `<option value="${x.voiceURI}" title="${x.lang}">${x.name}</option>`).join('');
            
            const langKey = lang.replace('-', '_');
            const tmpKey = `_tmpV_${panelIndex}_${langKey}`;
            let selected = null;
            if (window[tmpKey] !== undefined) {
                selected = window[tmpKey];
                elems.voiceSelect.value = selected;
            }

            // Safari 遅延・URI不一致時のフォールバック: 有効な option が無ければ先頭の voice を選択
            if (!elems.voiceSelect.value && voices.length > 0) {
                elems.voiceSelect.value = voices[0].voiceURI;
            }

            // まだ空ならプレースホルダ維持（voicesなし）
            if (!elems.voiceSelect.value) {
                elems.voiceSelect.value = "";
            }

            // 保存値があるのに match しなかった場合は警告を任意でログ
            if (selected && elems.voiceSelect.value !== selected) {
                console.warn(`Voice ${selected} not found in ${lang}, selected fallback ${elems.voiceSelect.value || '(none)'}`);
            }
        }

        function processTemplate(tpl, lang, {h, m, s, now} = {}) {
            return tpl.replace(/{h}/g, h)
                .replace(/{m}/g, m)
                .replace(/{s}/g, s)
                .replace(/{lts}/g, now.toLocaleTimeString(lang, {
                    /*
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                    */
                }))
            ;
        }

        function testSpeak(panelIndex) {
            synth.cancel();

            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            
            const masterVol = parseFloat(volInput.value);
            const elems = languageElements[panelIndex];
            const lang = panelLanguages[panelIndex];
            const tmpArgs = {h, m, s, now};
            const vol = parseFloat(elems.volInput.value);
            const utterance = new SpeechSynthesisUtterance(processTemplate(elems.template.value, lang, tmpArgs));
            utterance.voice = voiceMapByVoiceURI[elems.voiceSelect.value];
            utterance.rate = parseFloat(elems.rateInput.value);
            utterance.volume = masterVol * vol;
            const targetPanel = elems.panel;

            utterance.onstart = () => {
                targetPanel.classList.add('is-testing');
                statusBadge.textContent = "Testing...";
                statusBadge.classList.add('speaking');
            };
            const onEnd = () => {
                targetPanel.classList.remove('is-testing');
                statusBadge.textContent = "Active";
                statusBadge.classList.remove('speaking');
            };
            utterance.onend = onEnd;
            utterance.onerror = onEnd;
            synth.speak(utterance);
        }

        function announce(h, m, s, isManual = false) {
            const currentTimeKey = `${h}:${m}:${s}`;
            if (!isManual && lastAnnouncedTime === currentTimeKey) return;
            lastAnnouncedTime = currentTimeKey;

            synth.cancel();
            const masterVol = parseFloat(volInput.value);

            timerCard.classList.add('is-speaking');
            statusBadge.textContent = "Speaking...";
            statusBadge.classList.add('speaking');

            const tmpArgs = {h, m, s, now: new Date()};
            const utterances = speechProfiles.map((profile, index) => {
                const elems = languageElements[index];
                const vol = parseFloat(elems.volInput.value);
                const lang = panelLanguages[index];
                const u = new SpeechSynthesisUtterance(processTemplate(elems.template.value, lang, tmpArgs));
                u.voice = voiceMapByVoiceURI[elems.voiceSelect.value];
                u.rate = parseFloat(elems.rateInput.value);
                u.volume = masterVol * vol;
                return u;
            });

            const onEnd = () => {
                timerCard.classList.remove('is-speaking');
                statusBadge.textContent = "Active";
                statusBadge.classList.remove('speaking');
            };
            utterances.forEach((u, index) => {
                u.onerror = onEnd;
                if (index === utterances.length - 1) {
                    u.onend = onEnd;
                } else {
                    u.onend = () => { setTimeout(() => synth.speak(utterances[index + 1]), 300); };
                }
            });
            synth.speak(utterances[0]);
        }

        let lastTime = {h: -1, m: -1, s: -1};

        function tick() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            
            // Only update display when second changes
            if (s !== lastTime.s || m !== lastTime.m || h !== lastTime.h) {
                lastTime = {h, m, s};
                dateDisplay.textContent = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')} (${weekdays[now.getDay()]})`;
                clockDisplay.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                if (targetMinutes.includes(m) && targetSeconds.includes(s)) announce(h, m, s);
            }
            
            requestAnimationFrame(tick);
        }

        function main() {
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && wakeLockCheckbox.checked) {
                    requestWakeLock();
                }
            });

            // テーマ選択の変更イベントを追加
            themeSelect.onchange = () => {
                applyTheme(themeSelect.value);
                saveSettings();
            };

            wakeLockCheckbox.onchange = () => {
                if (wakeLockCheckbox.checked) {
                    requestWakeLock();
                } else {
                    releaseWakeLock();
                }
                saveSettings();
            };
            
            speechProfiles.forEach((profile, index) => {
                const elems = languageElements[index];
                elems.testBtn.onclick = (e) => { e.stopPropagation(); testSpeak(index); };
                elems.volInput.oninput = (e) => updateRangeText(elems.volValue, `${Math.round(e.target.value * 100)}%`, 1, e.target.value);
                elems.rateInput.oninput = (e) => updateRangeText(elems.rateValue, `${parseFloat(e.target.value).toFixed(1)}`, 1, e.target.value);
                elems.langSelect.onchange = () => {
                    panelLanguages[index] = elems.langSelect.value;
                    updateVoiceSelect(index, elems.langSelect.value);
                    saveSettings();
                };
            });
            ambientTestTrigger.onclick = (e) => {
                const rect = timerCard.getBoundingClientRect();
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = `${size}px`;
                ripple.style.left = `${e.clientX - rect.left - size/2}px`;
                ripple.style.top = `${e.clientY - rect.top - size/2}px`;
                timerCard.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
                const d = new Date();
                announce(d.getHours(), d.getMinutes(), d.getSeconds(), true);
            };
            
            volInput.oninput = (e) => updateRangeText(volValue, `${Math.round(e.target.value * 100)}%`, 1, e.target.value);

            document.querySelectorAll('input, select, textarea').forEach(el => {
                // themeSelectは別途onchangeで処理しているので除外しても良いが、一括保存のため残す
                el.addEventListener('change', saveSettings);
                el.addEventListener('click', (e) => e.stopPropagation());
                if (el.tagName.toLocaleLowerCase()==='textarea') {
                    el.title = "{h} = hours, {m} = minutes, {s} = seconds, {lts} = locale time string";
                }
            });
            
            toggleSettingsBtn.onclick = (e) => {
                e.stopPropagation();
                settingsBody.classList.toggle('collapsed');
                toggleText.textContent = settingsBody.classList.contains('collapsed') ? "Show Settings" : "Hide Settings";
                saveSettings();
            };

            loadSettings();
            setupVoices();
            if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = setupVoices;
            requestAnimationFrame(tick);
        }

        startupButton.onclick = () => {
            synth.cancel();
            synth.speak(new SpeechSynthesisUtterance(' '));
            startupOverlay.style.opacity = '0'; // fire css opacity transition
            setTimeout(() => startupOverlay.style.display = 'none', 1000);
            main();
        };

        //////////////////////////////////////////

        const inputScaleX = document.getElementById('inputScaleX');
        const inputScaleY = document.getElementById('inputScaleY');
        const inputLS = document.getElementById('inputLS');
        const resetBtn = document.getElementById('resetBtn');

        function updateClockStyles() {
            const x = inputScaleX.value || 1;
            const y = inputScaleY.value || 1;
            const ls = inputLS.value || 0;

            const docStyle = document.documentElement.style;
            docStyle.setProperty('--scale-x', x);
            docStyle.setProperty('--scale-y', y);
            docStyle.setProperty('--letter-spacing', ls);
        }

        // 入力イベントの設定
        [inputScaleX, inputScaleY, inputLS].forEach(el => {
            el.addEventListener('input', updateClockStyles);
        });

        // リセット機能
        resetBtn.addEventListener('click', () => {
            inputScaleX.value = 1.0;
            inputScaleY.value = 1.0;
            inputLS.value = 0;
            updateClockStyles();
        });

        // 初期実行
        updateClockStyles();
    </script>
</body>
</html>
